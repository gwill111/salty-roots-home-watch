<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salty Roots Home Watch & Estate Management Services | Marco Island & SW Florida</title>
  <meta name="description" content="Premium home watch and estate management services in Marco Island, Naples, Bonita Springs, Estero and Southwest Florida. Veteran owned.">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .hero-bg {
      position: relative;
      height: 100vh;
      overflow: hidden;
    }
    .hero-bg video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }
    .hero-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55));
      z-index: 1;
    }
    html { scroll-behavior: smooth; }
  </style>
</head>
<body class="font-sans">

  <!-- Navbar -->
  <nav class="bg-white shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-5 flex items-center">
      <div class="flex items-center gap-4 flex-shrink-0">
        <img src="mangrove.png" alt="Salty Roots Mangrove" class="h-16 w-auto">
        <div>
          <span class="text-4xl font-bold text-teal-900 tracking-tight">Salty Roots</span>
          <span class="block text-xl font-semibold tracking-[2px] text-teal-600 -mt-1">HOME WATCH & ESTATE MANAGEMENT SERVICES</span>
        </div>
      </div>

      <div class="hidden md:flex gap-8 text-gray-700 font-medium ml-auto">
        <a href="#home" class="hover:text-teal-600 transition">Home</a>
        <a href="#services" class="hover:text-teal-600 transition">Services</a>
        <a href="#about" class="hover:text-teal-600 transition">About</a>
        <a href="#areas" class="hover:text-teal-600 transition">Service Areas</a>
      </div>

      <button id="mobile-menu-btn" class="md:hidden text-3xl text-teal-900 ml-auto">
        <i class="fa-solid fa-bars"></i>
      </button>
    </div>

    <div id="mobile-menu" class="hidden md:hidden bg-white border-t">
      <div class="px-6 py-6 flex flex-col gap-4 text-gray-700 font-medium">
        <a href="#home" class="hover:text-teal-600">Home</a>
        <a href="#services" class="hover:text-teal-600">Services</a>
        <a href="#about" class="hover:text-teal-600">About</a>
        <a href="#areas" class="hover:text-teal-600">Service Areas</a>
      </div>
    </div>
  </nav>

  <!-- HERO - Drone flyover video background -->
  <section id="home" class="hero-bg relative flex items-center text-white">
    <!-- Drone video -->
    <video autoplay muted loop playsinline class="absolute inset-0 w-full h-full object-cover">
      <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny_320x180_10s_1MB.mp4" type="video/mp4">
      <!-- Fallback image if video fails to load -->
      <img src="https://images.pexels.com/photos/9874006/pexels-photo-9874006.jpeg" alt="Marco Island" class="absolute inset-0 w-full h-full object-cover">
    </video>

    <!-- Dark overlay -->
    <div class="hero-overlay"></div>

    <div class="max-w-4xl mx-auto px-6 text-center relative z-10">
      <h1 class="text-5xl md:text-6xl font-bold">Premium Services * Rooted Values</h1>
      <div class="flex flex-col sm:flex-row gap-4 justify-center mt-10">
        <a href="#contact" class="bg-white text-teal-800 px-10 py-4 rounded-full text-xl font-semibold">Request an Appointment</a>
        <a href="tel:2392594105" class="border-2 border-white px-10 py-4 rounded-full text-xl font-semibold">Call (239) xxx-xxxx</a>
      </div>
    </div>
  </section>

  <!-- Rest of the site (unchanged) -->
  <!-- WHY CHOOSE US, SERVICES, ABOUT, SERVICE AREAS, CONTACT, FOOTER -->

  <!-- Scripts -->
  <script>
    const btn = document.getElementById('mobile-menu-btn');
    const menu = document.getElementById('mobile-menu');
    btn.addEventListener('click', () => {
      menu.classList.toggle('hidden');
      const icon = btn.querySelector('i');
      icon.classList.toggle('fa-bars');
      icon.classList.toggle('fa-xmark');
    });
  </script>
</body>
</html>
