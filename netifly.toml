# Netlify configuration for Salty Roots Home Watch
[build]
  # No build step needed for plain HTML/CSS/JS site
  command = "echo '✅ No build required for static site'"
  publish = "."

# Optional: Enable pretty URLs (no .html in the address bar)
[[redirects]]
  from = "/*"
  to = "/:splat"
  status = 200

# Optional: Make the contact form work even better
[context.production.environment]
  NETLIFY_FORMS = "true"